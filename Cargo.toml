[package]
name = "bounded-vec"
version = "0.7.1"
license = "CC0-1.0"
authors = ["Denys Zadorozhnyi <denys@zadorozhnyi.com>"]
edition = "2021"
description = "Non-empty rust Vec wrapper with type guarantees on lower and upper bounds for items quantity."
repository = "https://github.com/ergoplatform/bounded-vec"

[dependencies]
serde = { version = "1.0.123", default-features = false, features = [
    "alloc",
    "derive",
], optional = true }
schemars = { version = ">=0.8,<1", default-features = false, optional = true }
proptest = { version = "1.0.0", optional = true }
borsh = { version = "1.5.4", default-features = false, features = ["unstable__schema"], optional = true }
backtrace = { version = "0.3", default-features = false, features = ["std"], optional = true }

[features]
serde = ["dep:serde"]
schema = ["serde", "dep:schemars"]
arbitrary = ["proptest"]
borsh = ["dep:borsh"]
backtrace = ["dep:backtrace"]

[dev-dependencies]
proptest = { version = "1.0.0" }
